# D-FSU Mosquitto broker config — Docker variant.
#
# Differs from mosquitto.conf (the HA OS add-on variant) only in the paths,
# which reference the container-local /mosquitto/ mount layout defined by the
# official eclipse-mosquitto image:
#   /mosquitto/config/   — config + acl + passwords
#   /mosquitto/certs/    — TLS material (bind-mounted from ha-config/certs)
#   /mosquitto/data/     — retained messages persistence
#   /mosquitto/log/      — broker logs
#
# Policy: TLS-only on 8883. Plaintext 1883 is off; firmware pins the CA and
# refuses plaintext fallback. Anonymous disabled; clients authenticate with
# username + password and are scoped by ACL.

listener 8883
protocol mqtt

cafile   /mosquitto/certs/dfsu-ca.crt
certfile /mosquitto/certs/broker.crt
keyfile  /mosquitto/certs/broker.key

allow_anonymous false
password_file /mosquitto/config/passwords
acl_file      /mosquitto/config/acl

max_connections  50
max_queued_messages 1000

# Persist retained messages across broker restarts — HA discovery configs live
# here, we don't want to re-advertise them on every broker bounce.
persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
