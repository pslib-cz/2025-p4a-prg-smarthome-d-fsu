# D-FSU Mosquitto broker config.
#
# Deploy path: Home Assistant OS Mosquitto add-on expects this at
# /share/mosquitto/mosquitto.conf (or equivalent on your HA install).
# On a bare-metal Mosquitto install, drop it into /etc/mosquitto/conf.d/.
#
# Policy: TLS-only on 8883. Plain 1883 is disabled — firmware pins the CA and
# refuses plaintext fallback. Anonymous disabled; every client authenticates
# with username + password and is scoped by ACL.

# Drop the plaintext listener entirely. If you need to debug locally, uncomment
# the 1883 block below — but never in production.
# listener 1883
# allow_anonymous true

listener 8883
protocol mqtt

# TLS material. Paths are relative to the Mosquitto addon's /share mount on
# HA OS; adjust for non-addon installs.
cafile   /share/mosquitto/certs/dfsu-ca.crt
certfile /share/mosquitto/certs/broker.crt
keyfile  /share/mosquitto/certs/broker.key

# Require clients to authenticate. passwords file is managed out-of-band
# (`mosquitto_passwd` — see README.md).
allow_anonymous false
password_file /share/mosquitto/passwords
acl_file      /share/mosquitto/acl

# Conservative limits — box + HA + phone relay is the entire client population.
max_connections  50
max_queued_messages 1000

# Persist retained messages across broker restarts — HA discovery configs live
# here, we don't want to re-advertise them on every broker bounce.
persistence true
persistence_location /share/mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
