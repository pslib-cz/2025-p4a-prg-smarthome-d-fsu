# D-FSU local Home Assistant + Mosquitto stack for development and demos.
#
# Runs HA Core + Mosquitto side-by-side on the dev laptop. Config lives in
# bind-mounted sibling directories so edits in this repo are picked up by
# the containers without rebuilds.
#
# Bring up:   docker compose up -d
# Logs:       docker compose logs -f
# Tear down:  docker compose down          # preserves ./ha-data and ./mosquitto-data
#
# Host networking is used on Linux so mDNS (homeassistant.local) + BLE-
# adjacent tooling work out of the box. On Windows/Mac Docker Desktop ignores
# network_mode: host — ports are forwarded explicitly below for those hosts.

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: dfsu-ha
    restart: unless-stopped
    volumes:
      - ./ha-data:/config
      # YAML-mode dashboards live in the repo (git-tracked) and are mounted
      # read-only into /config/lovelace; referenced by configuration.yaml.
      - ./lovelace:/config/lovelace:ro
      # Git-tracked automations — merged with HA's own automations.yaml via
      # !include_dir_merge_list in configuration.yaml.
      - ./automations:/config/packages/dfsu-automations:ro
      - /etc/localtime:/etc/localtime:ro
    # Linux: uncomment network_mode and delete the ports: block.
    # network_mode: host
    ports:
      - "8123:8123"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: dfsu-mosquitto
    restart: unless-stopped
    volumes:
      # Single directory mount — individual file mounts are fragile on Windows
      # Docker Desktop. Everything Mosquitto reads from /mosquitto/config/ lives
      # in ./mosquitto-data/: the conf (copied from ../mosquitto/ at setup
      # time), the acl, and the passwords file created via mosquitto_passwd.
      - ./mosquitto-data:/mosquitto/config
      - ./certs:/mosquitto/certs:ro
      - ./mosquitto-data/data:/mosquitto/data
      - ./mosquitto-data/log:/mosquitto/log
    ports:
      - "8883:8883"
