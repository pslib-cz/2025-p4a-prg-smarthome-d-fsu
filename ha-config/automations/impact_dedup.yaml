# Impact handling for dfsu-697090.
#
# Dedup: same event may arrive twice — once directly over MQTT from the box,
# once relayed by the phone (BLE → app → REST → HA) when the box has no WiFi.
# Both paths publish to `dfsu/<clientId>/impact` with the same `id` field;
# drop any message whose id is <= the stored last-seen value.
#
# Helper required (defined in configuration.yaml):
#   input_number.dfsu_697090_last_impact_id

- alias: "D-FSU 697090 — impact dedup + notify"
  id: dfsu_697090_impact
  mode: queued          # serialize so two publishes in-flight don't race
  trigger:
    - platform: mqtt
      topic: dfsu/dfsu-697090/impact
  condition:
    - "{{ trigger.payload_json.id | int(0) > states('input_number.dfsu_697090_last_impact_id') | int(0) }}"
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.dfsu_697090_last_impact_id
      data:
        value: "{{ trigger.payload_json.id }}"

    - service: logbook.log
      data:
        name: "D-FSU 697090"
        message: >-
          impact id={{ trigger.payload_json.id }}
          peakG={{ '%.2f' | format(trigger.payload_json.peakG | float) }}
        entity_id: binary_sensor.d_fsu_dfsu_697090_impact

    - service: persistent_notification.create
      data:
        title: "D-FSU impact"
        notification_id: "dfsu_697090_impact_{{ trigger.payload_json.id }}"
        message: >-
          Box dfsu-697090 took a hit — peakG
          {{ '%.2f' | format(trigger.payload_json.peakG | float) }}
          (event {{ trigger.payload_json.id }})
