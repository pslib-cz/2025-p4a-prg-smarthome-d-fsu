; D-FSU ESP32-S3 firmware
; See ../../firmware-architecture.md for module layout and design.

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; Custom partition table: carves out 64 KB for the impact-log ring buffer.
board_build.partitions = partitions.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB

; C++17 for the whole tree — digit separators, constexpr if, structured bindings, etc.
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -D DFSU_FW_VERSION=\"0.1.0\"
    ; Route Arduino Serial to the native USB-CDC port on the ESP32-S3
    ; (the port labeled "USB", not "UART"). Without these, Serial silently
    ; goes to UART0 on GPIO43/44 and you see nothing over USB.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; Phase 1A — sensors
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit SSD1306 @ ^2.5.10
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; Phase 2 — BLE (pulled in ahead so first install resolves everything)
    h2zero/NimBLE-Arduino @ ^2.0.0
    ; Phase 5 — MQTT + JSON
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.2.0
    ; Phase 4/7 — LED strip
    fastled/FastLED @ ^3.7.0
